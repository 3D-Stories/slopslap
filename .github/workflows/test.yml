name: test
on:
  push:
    branches: [main]
  pull_request:
jobs:
  pytest:
    runs-on:
      group: 3ds-fleet
      labels: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pinned test deps
        run: pip install -r tests/requirements.txt
      - name: Run the gate (whole suite, incl. the eval-run DONE gate)
        run: pytest tests/ -q
